<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anglo-Saxon vs Latinate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="panel">
      <header class="title-wrap">
        <p class="kicker">Live Style Meter</p>
        <h1>Anglo-Saxon vs Latinate</h1>
        <p class="subtitle">Analyzes your recent speech and shows word origin in real time.</p>
      </header>

      <div class="controls">
        <button id="toggleButton" class="btn" type="button">Start Listening</button>
        <label class="window-control" for="windowSeconds">
          Window (seconds)
          <input id="windowSeconds" type="number" min="10" max="600" step="5" value="60">
        </label>
      </div>

      <p id="status" class="status">Status: idle</p>

      <div class="bar-chart" role="img" aria-label="Anglo-Saxon vs Latinate word balance">
        <div class="bar-column bar-column--anglo">
          <div class="bar-label">Anglo-Saxon</div>
          <div class="bar-track">
            <div id="barAnglo" class="bar-fill"></div>
          </div>
          <div class="bar-count"><span id="angloCount">0</span> words</div>
          <div id="angloWords" class="word-list"></div>
        </div>
        <div class="bar-column bar-column--latinate">
          <div class="bar-label">Latinate</div>
          <div class="bar-track">
            <div id="barLatinate" class="bar-fill"></div>
          </div>
          <div class="bar-count"><span id="latinateCount">0</span> words</div>
          <div id="latinateWords" class="word-list"></div>
        </div>
      </div>

      <div class="metrics">
        <div class="metric">
          <p class="metric-label">Balance</p>
          <p id="dialReading" class="metric-value">Balanced</p>
        </div>
        <div class="metric">
          <p class="metric-label">Classified Words</p>
          <p id="wordCount" class="metric-value">0</p>
        </div>
      </div>

      <section class="transcript">
        <p class="transcript-label">Recent Transcript</p>
        <p id="recentTranscript">No speech captured yet.</p>
      </section>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
